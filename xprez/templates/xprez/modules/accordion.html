{% extends "xprez/modules/base.html" %}
{% load xprez %}

{% block content %}
    {% for item in items %}
        <div class="xprez-accordion__item">
            <button
                class="xprez-accordion__title"
                type="button"
                aria-expanded="false"
                data-accordion-trigger
            >{{ item.title }}</button>
            <div class="xprez-accordion__body" data-accordion-body>
                {{ item.text|safe }}
            </div>
        </div>
    {% endfor %}
{% endblock %}
