{% extends "xprez/modules/base.html" %}
{% load xprez %}

{% block content %}
    {% for item in items %}
        <div class="xprez-accordion__item">
            <div 
                class="xprez-accordion__title"
                type="button"
                aria-expanded="false"
                data-accordion-trigger
            >
                <h4>{{ item.title }}</h4>
                {% include "xprez/shared/icons/plus_simple.html" %}
            </div>
            <div class="xprez-accordion__body" data-accordion-body>
                {{ item.render_text }}
            </div>
        </div>
    {% endfor %}
{% endblock %}
